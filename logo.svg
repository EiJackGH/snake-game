<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Dark Arcade Slate Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#04060b"/>
    </linearGradient>

    <!-- Neon Green Snake Glow Gradient -->
    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="50%" stop-color="#00e575"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>

    <!-- Sleek Tech Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>

    <!-- Deep Drop Shadow Filter for Depth -->
    <filter id="retroShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Neon Core Highlight Blur -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="400" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Subtle Grid Accent Lines (Arcade Theme) -->
  <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 200,0 L 200,400 M 400,0 L 400,400 M 600,0 L 600,400" 
        fill="none" stroke="#1e293b" stroke-width="2" opacity="0.3"/>

  <!-- Core Layout Assembly (Grouped for Shadow Effects) -->
  <g filter="url(#retroShadow)">
    
    <!-- Background Layer of Snake Body (Weaving behind 'SNAKE') -->
    <path d="M 120,290 L 120,220 Q 120,180 160,180 L 320,180" 
          fill="none" stroke="url(#snakeGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Main Title: SNAKE -->
    <text x="400" y="210" 
          font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="140" letter-spacing="8"
          fill="url(#textGrad)" text-anchor="middle">
      SNAKE
    </text>

    <!-- Foreground Layer of Snake Body (Weaving over the text) -->
    <path d="M 320,180 L 600,180 Q 660,180 660,240 L 660,260 Q 660,310 610,310 L 450,310 Q 400,310 400,260" 
          fill="none" stroke="url(#snakeGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>

    <!-- Subtitle: GAME -->
    <text x="590" y="295" 
          font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" letter-spacing="12"
          fill="#39ff14" opacity="0.9" filter="url(#neonGlow)">
      GAME
    </text>

    <!-- Snake Head Details (Facing Left at the bottom end loop) -->
    <!-- Glowing Eye -->
    <circle cx="420" cy="250" r="6" fill="#ffffff" filter="url(#neonGlow)"/>
    <!-- Forked Tongue -->
    <path d="M 375,260 L 350,260 M 350,260 L 340,252 M 350,260 L 340,268" 
          fill="none" stroke="#ff3366" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Classic Food Pellet (Target Objective Accent) -->
    <circle cx="230" cy="260" r="14" fill="#ff3366" filter="url(#neonGlow)"/>
    <circle cx="225" cy="255" r="4" fill="#ffffff"/>
  </g>
</svg>
