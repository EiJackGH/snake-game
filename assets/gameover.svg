<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Modern Minimalist Gradient Background (Deep Chocolate to Dark Wood) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b1810"/>
      <stop offset="100%" stop-color="#140b07"/>
    </linearGradient>

    <!-- Caramel/Tan Text Gradient for Premium Contrast -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d6be"/>
      <stop offset="40%" stop-color="#d9a47e"/>
      <stop offset="100%" stop-color="#a66e46"/>
    </linearGradient>

    <!-- Smooth Abstract Snake Body Gradient -->
    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8c5835"/>
      <stop offset="50%" stop-color="#59321d"/>
      <stop offset="100%" stop-color="#381d0f"/>
    </linearGradient>

    <!-- Modern Soft Drop Shadow for Clean UI Separation -->
    <filter id="modernShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Clean Rounded Background Card -->
  <rect width="800" height="500" rx="32" fill="url(#bgGrad)"/>

  <!-- Core Graphic Layout Group -->
  <g filter="url(#modernShadow)">
    
    <!-- Abstract Knot Ribbon (Modern representation of a crashed/tangled snake) -->
    <path d="M 150,340 
             Q 220,160 400,160 
             Q 580,160 650,340
             Q 500,420 400,320
             Q 300,220 180,300" 
          fill="none" stroke="url(#snakeGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Main Heading: GAME OVER -->
    <!-- Utilizing a clean, geometric sans-serif type aesthetic -->
    <text x="400" y="260" 
          font-family="system-ui, -apple-system, SF Pro Display, Roboto, sans-serif" 
          font-weight="900" 
          font-size="96" 
          letter-spacing="12"
          fill="url(#textGrad)" 
          text-anchor="middle">
      GAME OVER
    </text>

    <!-- Modern Minimalist Subtitle -->
    <text x="400" y="325" 
          font-family="system-ui, -apple-system, SF Pro Text, Roboto, sans-serif" 
          font-weight="500" 
          font-size="22" 
          letter-spacing="6"
          fill="#d9a47e" 
          opacity="0.7"
          text-anchor="middle">
      TRY AGAIN!
    </text>

    <!-- Decorative Interface Element: Circular Accent Point -->
    <circle cx="400" cy="110" r="12" fill="#8c5835" opacity="0.5"/>
    <line x1="350" y1="110" x2="450" y2="110" stroke="#8c5835" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
