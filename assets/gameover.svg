<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="100%">
  <defs>
    <!-- Modern Minimalist Gradient Background (Deep Chocolate to Dark Roasted Coffee) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26150f"/>
      <stop offset="100%" stop-color="#120906"/>
    </linearGradient>

    <!-- Cream / Tan Typographic Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7dcc4"/>
      <stop offset="50%" stop-color="#dba37b"/>
      <stop offset="100%" stop-color="#a86f44"/>
    </linearGradient>

    <!-- Abstract Minimalist Snake Flow Gradient -->
    <linearGradient id="snakeFlowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8f5733"/>
      <stop offset="100%" stop-color="#422212"/>
    </linearGradient>

    <!-- Interactive Retry Button Gradient (Warm Caramel Highlight) -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d49468"/>
      <stop offset="100%" stop-color="#ab6b42"/>
    </linearGradient>

    <!-- Premium Soft Drop Shadow Filter -->
    <filter id="smoothShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Clean Rounded Outer Canvas Card -->
  <rect width="800" height="550" rx="36" fill="url(#bgGrad)"/>

  <!-- Core Component Assembly Layout Group -->
  <g filter="url(#smoothShadow)">
    
    <!-- Abstract Curved Line Geometry (Modern Representation of a tangled/ended snake loop) -->
    <path d="M 180,310 C 260,190 540,190 620,310" 
          fill="none" stroke="url(#snakeFlowGrad)" stroke-width="24" stroke-linecap="round" opacity="0.4"/>

    <!-- Main Title: GAME OVER -->
    <text x="400" y="240" 
          font-family="system-ui, -apple-system, SF Pro Display, Roboto, sans-serif" 
          font-weight="900" 
          font-size="92" 
          letter-spacing="14"
          fill="url(#textGrad)" 
          text-anchor="middle">
      GAME OVER
    </text>

    <!-- Modern Minimalist Status Subtitle -->
    <text x="400" y="300" 
          font-family="system-ui, -apple-system, SF Pro Text, Roboto, sans-serif" 
          font-weight="500" 
          font-size="20" 
          letter-spacing="8"
          fill="#dba37b" 
          opacity="0.7"
          text-anchor="middle">
      THE RUN HAS ENDED
    </text>

    <!-- Dynamic Interface Element: Top Segment Divider Dots -->
    <circle cx="400" cy="110" r="8" fill="#8f5733" opacity="0.6"/>
    <circle cx="370" cy="110" r="4" fill="#8f5733" opacity="0.3"/>
    <circle cx="430" cy="110" r="4" fill="#8f5733" opacity="0.3"/>

    <!-- ==================================================== -->
    <!-- INTERACTIVE RETRY BUTTON COMPONENT LAYER             -->
    <!-- ==================================================== -->
    <!-- You can attach your UI click boundaries to this group id -->
    <g id="ui-retry-button" cursor="pointer">
      <!-- Button Base Pillow (Rounded Rect) -->
      <rect x="280" y="370" width="240" height="64" rx="20" fill="url(#btnGrad)"/>
      
      <!-- Subtle Button Border Overlay for Premium Inset Detail -->
      <rect x="280" y="370" width="240" height="64" rx="20" fill="none" stroke="#f7dcc4" stroke-width="2" opacity="0.2"/>
      
      <!-- Modern Loop/Refresh Arrow SVG Icon Geometry -->
      <path d="M 336,402 A 10,10 0 1,1 344,392 L 344,386 M 344,392 L 336,392" 
            fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Button Label Typography -->
      <text x="415" y="410" 
            font-family="system-ui, -apple-system, SF Pro Text, Roboto, sans-serif" 
            font-weight="700" 
            font-size="22" 
            letter-spacing="4"
            fill="#ffffff" 
            text-anchor="middle">
        RETRY
      </text>
    </g>
    
  </g>
</svg>
