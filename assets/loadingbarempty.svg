<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60" width="100%" height="100%">
  <defs>
    <!-- Deep Matte Slate Background for the Track Inner Empty Space -->
    <linearGradient id="emptyTrackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#161f33"/>
    </linearGradient>

    <!-- Outer Tech Border Frame Color -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Subtle Inset Shadow to Give Depth to the Empty Channel Slot -->
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.8" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Outer Structural Border Frame -->
  <rect x="2" y="2" width="596" height="56" rx="12" fill="none" stroke="url(#frameGrad)" stroke-width="4"/>

  <!-- Inner Channel Track Slot Container (The Empty Bar Space) -->
  <rect x="8" y="8" width="584" height="44" rx="8" fill="url(#emptyTrackGrad)" filter="url(#innerShadow)"/>

  <!-- Subdued Background Grid Tech Lines (Simulating an empty digital slot) -->
  <g opacity="0.15">
    <path d="M 40,8 L 40,52 M 80,8 L 80,52 M 120,8 L 120,52 M 160,8 L 160,52 M 200,8 L 200,52 M 240,8 L 240,52 M 280,8 L 280,52 M 320,8 L 320,52 M 360,8 L 360,52 M 400,8 L 400,52 M 440,8 L 440,52 M 480,8 L 480,52 M 520,8 L 520,52 M 560,8 L 560,52" 
          fill="none" stroke="#38bdf8" stroke-width="2"/>
  </g>
</svg>
