<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <linearGradient id="shop-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2a1d"/>
      <stop offset="100%" stop-color="#1d130b"/>
    </linearGradient>

    <linearGradient id="item-unlocked" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3525"/>
      <stop offset="100%" stop-color="#2d1f15"/>
    </linearGradient>

    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d38312"/>
      <stop offset="100%" stop-color="#a35400"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="580" height="430" rx="16" fill="url(#shop-bg)" stroke="#695345" stroke-width="4" filter="url(#panel-shadow)"/>

  <path d="M 14 26 A 12 12 0 0 1 26 14 L 574 14 A 12 12 0 0 1 586 26 L 586 70 L 14 70 Z" fill="#2b1c12"/>
  <text x="35" y="47" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#f5ede6" letter-spacing="0.5">SNAKE SKINS SHOP</text>
  
  <g transform="translate(460, 27)">
    <rect x="0" y="0" width="105" height="28" rx="14" fill="#140d07" stroke="#874600" stroke-width="1"/>
    <text x="15" y="19" font-size="14">🪙</text>
    <text x="90" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#f39c12" text-anchor="end">1,250</text>
  </g>

  <g transform="translate(40, 95)">
    <rect x="0" y="0" width="150" height="180" rx="8" fill="url(#item-unlocked)" stroke="#a35400" stroke-width="2"/>
    <text x="75" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#f5ede6" text-anchor="middle">Classic Green</text>
    <path d="M 45 90 Q 75 60 105 90 T 135 90" fill="none" stroke="#2ecc71" stroke-width="12" stroke-linecap="round"/>
    <rect x="15" y="135" width="120" height="30" rx="4" fill="#27ae60"/>
    <text x="75" y="154" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">EQUIPPED</text>
  </g>

  <g transform="translate(225, 95)">
    <rect x="0" y="0" width="150" height="180" rx="8" fill="url(#item-unlocked)" stroke="#543c2b" stroke-width="1"/>
    <text x="75" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#f5ede6" text-anchor="middle">Lava Glow</text>
    <path d="M 45 90 Q 75 60 105 90 T 135 90" fill="none" stroke="#e74c3c" stroke-width="12" stroke-linecap="round"/>
    <rect x="15" y="135" width="120" height="30" rx="4" fill="url(#gold-grad)" stroke="#874600" stroke-width="1"/>
    <text x="75" y="154" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">🪙 400</text>
  </g>

  <g transform="translate(410, 95)">
    <rect x="0" y="0" width="150" height="180" rx="8" fill="url(#item-unlocked)" stroke="#543c2b" stroke-width="1"/>
    <text x="75" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#f5ede6" text-anchor="middle">Royal Purple</text>
    <path d="M 45 90 Q 75 60 105 90 T 135 90" fill="none" stroke="#9b59b6" stroke-width="12" stroke-linecap="round"/>
    <rect x="15" y="135" width="120" height="30" rx="4" fill="url(#gold-grad)" stroke="#874600" stroke-width="1"/>
    <text x="75" y="154" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">🪙 1,500</text>
  </g>

  <g transform="translate(40, 375)">
    <rect x="0" y="0" width="130" height="36" rx="6" fill="#4a3e3d" stroke="#362d2c" stroke-width="1"/>
    <text x="65" y="22" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#f5ede6" text-anchor="middle">BACK</text>
  </g>

  <text x="560" y="397" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c2b4aa" text-anchor="end">Earn coins by playing matches and processing daily milestones.</text>

</svg>
