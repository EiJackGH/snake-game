<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60" width="100%" height="100%">
  <defs>
    <!-- Neon Cyan-Green Outer Stroke Gradient -->
    <linearGradient id="neonGlowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="50%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>

    <!-- Intense Glow Filter for the Outline Track -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hollow Neon Core Frame (Strictly stroke-based, no background filling) -->
  <rect x="6" y="6" 
        width="588" 
        height="48" 
        rx="10" 
        fill="none" 
        stroke="url(#neonGlowGrad)" 
        stroke-width="5" 
        filter="url(#neonGlow)"/>

  <!-- Tech Accent Crosshairs in the Corners -->
  <g stroke="#39ff14" stroke-width="2" opacity="0.8">
    <!-- Top-Left Accent -->
    <path d="M 2,16 L 2,2 L 16,2"/>
    <!-- Top-Right Accent -->
    <path d="M 598,16 L 598,2 L 584,2"/>
    <!-- Bottom-Left Accent -->
    <path d="M 2,44 L 2,58 L 16,58"/>
    <!-- Bottom-Right Accent -->
    <path d="M 598,44 L 598,58 L 584,58"/>
  </g>

  <!-- Left-aligned Indicator Notch (Simulating the start of loading progress) -->
  <rect x="16" y="14" 
        width="12" 
        height="32" 
        rx="2" 
        fill="none" 
        stroke="#39ff14" 
        stroke-width="3" 
        filter="url(#neonGlow)"/>
</svg>
