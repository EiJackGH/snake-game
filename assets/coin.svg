<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Gold Border -->
  <circle cx="32" cy="32" r="28" fill="#DAA520" stroke="#8B6508" stroke-width="2"/>
  <!-- Inner Gold Shiny Circle -->
  <circle cx="32" cy="32" r="22" fill="#FFD700"/>
  <!-- Raised Border inside coin -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#DAA520" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Currency Symbol "C" (Coin) -->
  <text x="32" y="39" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#B8860B" text-anchor="middle">C</text>
  <!-- Highlight -->
  <circle cx="22" cy="22" r="3" fill="#FFFFFF" opacity="0.8"/>
</svg>
