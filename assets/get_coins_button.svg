<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 42" width="170" height="42">
  <defs>
    <filter id="btn-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="btn-gold-brown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d38312"/>
      <stop offset="100%" stop-color="#a35400"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="166" height="36" rx="6" fill="url(#btn-gold-brown)" stroke="#874600" stroke-width="1.5" filter="url(#btn-shadow)"/>

  <text x="85" y="24" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">GET COINS</text>
</svg>
