<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <defs>
    <!-- Track/Background Gradient -->
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#151821"/>
      <stop offset="100%" stop-color="#212530"/>
    </linearGradient>

    <!-- Border Metallic Bronze Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a5a36"/>
      <stop offset="50%" stop-color="#d9a066"/>
      <stop offset="100%" stop-color="#5c3a21"/>
    </linearGradient>

    <!-- Fill Green Gradient -->
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58d68d"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>

    <!-- Inner Glow/Shadow Filter -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer Glowing Border -->
  <rect x="5" y="5" width="390" height="50" rx="15" fill="none" stroke="url(#borderGrad)" stroke-width="4"/>

  <!-- Track (Empty Space inside the bar) -->
  <rect x="9" y="9" width="382" height="42" rx="11" fill="url(#trackGrad)" filter="url(#innerShadow)"/>

  <!-- Progress Fill (50%) -->
  <rect x="11" y="11" width="189" height="38" rx="9" fill="url(#fillGrad)" filter="url(#glow)"/>

  <!-- Glass Reflection Highlight Overlay -->
  <path d="M 9,9 L 391,9 C 391,24 380,24 380,24 L 20,24 C 9,24 9,9 9,9 Z" fill="#ffffff" opacity="0.1" pointer-events="none"/>
</svg>
